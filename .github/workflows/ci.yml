name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  validate:
    name: Validate gateway config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate KrakenD configuration and bootstrap scopes
        run: ./scripts/ci-validate.sh
